<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeHelp — Login / Sign up</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Phone frame matches CUSTOMER_1_SLIDE.png mockup -->
  <div class="phone" role="application" aria-label="HomeHelp login screen">

    <!-- Status bar -->
    <div class="statusbar">
      <span class="time">9:41</span>
      <span class="icons">
        <span class="bars" aria-hidden="true"></span>
        <span class="wifi" aria-hidden="true"></span>
        <span class="battery" aria-hidden="true"></span>
      </span>
    </div>

    <!-- Hero / branding -->
    <section class="hero">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="34" height="34" fill="none">
            <path d="M3 11.5 12 4l9 7.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 10.5V20h14v-9.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 6.5l.6 1.4 1.5.1-1.1 1 .35 1.5L12 9.7l-1.3.8.35-1.5-1.1-1 1.5-.1z" fill="#fff"/>
          </svg>
        </span>
        <span class="brand-name">HomeHelp</span>
      </div>
      <p class="tagline">Trusted house help<br />at your fingertips</p>
      <div class="illustration" aria-hidden="true">
        <div class="sofa"></div>
        <div class="plant"></div>
        <div class="helper"></div>
      </div>
    </section>

    <!-- Login card -->
    <section class="card">
      <h1 class="card-title">Login or Sign up</h1>
      <p class="card-sub">Enter your mobile number to continue</p>

      <form id="login-form" novalidate>
        <div class="field" id="phone-field">
          <span class="phone-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <path d="M6.6 10.8a13 13 0 0 0 5.6 5.6l1.9-1.9c.3-.3.6-.4 1-.3 1.1.4 2.3.6 3.5.6.6 0 1 .4 1 1V19c0 .6-.4 1-1 1A16 16 0 0 1 4 5c0-.6.4-1 1-1h2.6c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.5.1.4 0 .8-.3 1z" fill="#6B46E5"/>
            </svg>
          </span>
          <span class="cc">+91</span>
          <input
            id="phone"
            name="phone"
            type="tel"
            inputmode="numeric"
            autocomplete="tel"
            maxlength="10"
            placeholder="98765 43210"
            aria-label="Mobile number"
            aria-describedby="phone-error"
          />
        </div>
        <p class="error" id="phone-error" role="alert"></p>

        <button type="submit" id="continue-btn" class="btn-primary" disabled>
          Continue
        </button>
      </form>

      <div class="divider"><span>or</span></div>

      <button type="button" id="google-btn" class="btn-google">
        <svg viewBox="0 0 48 48" width="20" height="20" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.5 2.5 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.2l7.8 6.1C12.2 13.2 17.6 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8C43.9 38 46.5 31.8 46.5 24.5z"/>
          <path fill="#FBBC05" d="M10.3 28.7c-.5-1.4-.8-2.9-.8-4.7s.3-3.3.8-4.7l-7.8-6.1C.9 16.4 0 20.1 0 24s.9 7.6 2.5 10.8l7.8-6.1z"/>
          <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.3-8.4 2.3-6.4 0-11.8-3.7-13.7-9.8l-7.8 6.1C6.4 42.6 14.6 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <p class="terms">
        By continuing, you agree to our<br />
        <a href="terms.html" id="terms-link">Terms &amp; Conditions</a>
        &amp;
        <a href="privacy.html" id="privacy-link">Privacy Policy</a>
      </p>
    </section>

    <div class="home-indicator" aria-hidden="true"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
