# HomeHelp — microservices proof (strangler-fig)
#
#   [ clients ] → gateway(:8080) ─┬─ /api/services*, /api/admin/services* → catalog-service(:4001) → postgres
#                                 └─ everything else (+ socket.io)          → monolith on host(:4000) → sqlite
#
# The legacy monolith keeps running on the host (customer-app: `npm run dev`, port 4000).
# This compose brings up the new pieces: Postgres, the Catalog service, and the Gateway.
# Point the apps at http://<host>:8080 to exercise the microservices path.
#
#   docker compose up --build
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homehelp
      POSTGRES_PASSWORD: homehelp
      POSTGRES_DB: catalog
    ports:
      - "5432:5432"
    volumes:
      - catalog-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homehelp -d catalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  catalog-service:
    build: ./microservices/catalog-service
    environment:
      PORT: 4001
      DATABASE_URL: postgres://homehelp:homehelp@postgres:5432/catalog
      MONOLITH_URL: http://host.docker.internal:4000
      INTERNAL_KEY: hh-internal-dev
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gateway:
    build: ./microservices/gateway
    environment:
      PORT: 8080
      CATALOG_URL: http://catalog-service:4001
      MONOLITH_URL: http://host.docker.internal:4000
    ports:
      - "8080:8080"
    depends_on:
      - catalog-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  catalog-pgdata:
